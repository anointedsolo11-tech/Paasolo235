<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="ppck-ver" content="8e30d73dc8c51a2f61377ea8c9751517" />
</head>
<body>
    <header>
        <h1>My Todo App</h1>
    </header>

    <div class="container">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button id="addBtn">Add</button>

        <div class="actions">
            <button id="darkModeBtn">🌙 Dark Mode</button>
            <button id="clearTasksBtn">🗑️ Clear All</button>
            <button id="supportBtn">💰 Support</button>
        </div>

        <!-- ====== ADSTERRA BANNER (Visible Ad) ====== -->
        <div style="text-align: center; margin: 15px 0;">
            <script>
                atOptions = {
                    'key' : '8b69adcadf5abaeca5e5d18a72f61c0e',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script src="https://bowlsharp.com/8b69adcadf5abaeca5e5d18a72f61c0e/invoke.js"></script>
        </div>

        <div id="taskList"></div>
    </div>

    <!-- ====== POPCASH POPUNDER (CPM - Per View) ====== -->
    <script type="text/javascript">
        var uid = '501707';
        var wid = '753996';
        var pop_tag = document.createElement('script');
        pop_tag.src = '//cdn.popcash.net/show.js';
        document.body.appendChild(pop_tag);
        pop_tag.onerror = function() {
            pop_tag = document.createElement('script');
            pop_tag.src = '//cdn2.popcash.net/show.js';
            document.body.appendChild(pop_tag);
        };
    </script>

    <!-- ====== BIDVERTISER PUSH NOTIFICATIONS (CPC - Per Click) ====== -->
    <script type='text/javascript'>
    (function(d) {
        var params = { bvpushsubid: 2104609, cb: (new Date()).getTime() };
        var qs = Object.keys(params).reduce(function(a, k){ a.push(k + '=' + encodeURIComponent(params[k])); return a},[]).join(String.fromCharCode(38));
        var s = d.createElement('script'); s.type='text/javascript';s.async=true;
        var p = 'https:' == document.location.protocol ? 'https' : 'http';
        s.src = p + "://cdn.hyperpromote.com/bidvertiser/tags/activejs/bdpush.js?" + qs;
        d.getElementsByTagName('body').item(0).appendChild(s);
    })(document);
    </script>

    <script src="input.js"></script>
</body>
</html>
