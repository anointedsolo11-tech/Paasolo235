<!DOCTYPE html>
<html lang="en">

    <title>★ My Todo App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <!-- HEADER -->

        </div>

        <!-- PAYMENT INFO (hidden by default) -->

            <p>Number: <span>0279576459</span></p>

        </div>

        <!-- TASK LIST -->
        <div id="taskList"></div>
    </div>

    <!-- SOCIAL BAR AD - Notification-style ad, highly engaging, pays per view and click -->
